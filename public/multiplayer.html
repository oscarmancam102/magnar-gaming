<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Multiplayer Checkers - Magnar Gaming</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            padding: 15px;
            border-radius: 10px;
            color: white;
            z-index: 10;
            backdrop-filter: blur(5px);
            pointer-events: auto;
        }
        #ui input, #ui button {
            margin: 5px;
            padding: 8px 12px;
            border-radius: 5px;
            border: none;
        }
        button {
            background: #00adb5;
            color: #1a1a2e;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        button:hover {
            background: #0f4c75;
            color: white;
        }
        #status {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            padding: 8px 16px;
            border-radius: 8px;
            color: #ffd700;
            font-weight: bold;
            z-index: 10;
        }
        .back-link {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            padding: 8px 16px;
            border-radius: 8px;
            color: white;
            text-decoration: none;
            z-index: 10;
            font-weight: bold;
        }
        .room-controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        @media (max-width: 600px) {
            #ui { top: 10px; left: 10px; padding: 8px; }
            #ui input, #ui button { padding: 4px 8px; font-size: 12px; }
        }
    </style>
</head>
<body>
    <div id="ui">
        <div>
            <button id="createBtn">🏠 Create Game Room</button>
            <div class="room-controls">
                <input type="text" id="roomCode" placeholder="Room Code">
                <button id="joinBtn">🔗 Join Room</button>
            </div>
        </div>
        <div id="roomDisplay" style="margin-top: 8px; font-size: 14px;"></div>
    </div>
    <a href="/" class="back-link">← Back to Magnar</a>
    <div id="status">⚡ Connecting to server...</div>

    <script src="/socket.io/socket.io.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        let socket = io();
        let currentRoom = null;
        let myColor = null;
        let gameActive = false;
        let boardState = [];
        let selectedPiece = null;
        let selectedRow = null, selectedCol = null;
        let currentTurn = null;
        
        // Three.js globals
        let scene, camera, renderer, controls, piecesGroup, raycaster, mouse, highlights = [];
        const lightColor = 0xf0d9b5, darkColor = 0xb58863, redColor = 0xe74c3c, blackColor = 0x2c3e50;

        // UI elements
        const createBtn = document.getElementById('createBtn');
        const joinBtn = document.getElementById('joinBtn');
        const roomCodeInput = document.getElementById('roomCode');
        const roomDisplay = document.getElementById('roomDisplay');
        const statusDiv = document.getElementById('status');

        // ----- Socket events -----
        socket.on('connect', () => {
            statusDiv.innerHTML = '✅ Connected to server';
        });

        socket.on('roomCreated', (roomId) => {
            currentRoom = roomId;
            roomDisplay.innerHTML = `📢 Your room code: <strong>${roomId}</strong> (share with friend)`;
            statusDiv.innerHTML = `Waiting for opponent...`;
        });

        socket.on('joinSuccess', (roomId) => {
            currentRoom = roomId;
            roomDisplay.innerHTML = `✅ Joined room: ${roomId}`;
            statusDiv.innerHTML = `Waiting for game to start...`;
        });

        socket.on('joinError', (msg) => {
            alert(msg);
            statusDiv.innerHTML = `❌ ${msg}`;
        });

        socket.on('gameReady', (data) => {
            myColor = data.yourColor;
            statusDiv.innerHTML = `Game started! You are ${myColor.toUpperCase()}. ${myColor === 'red' ? 'Your turn' : 'Opponent\'s turn'}`;
            gameActive = true;
        });

        socket.on('gameState', (state) => {
            boardState = state.board;
            currentTurn = state.turn;
            renderPiecesFromBoard();
            clearHighlights();
            selectedPiece = null;
            if (gameActive) {
                const isMyTurn = (myColor === currentTurn);
                statusDiv.innerHTML = isMyTurn ? `✅ YOUR TURN (${myColor.toUpperCase()})` : `⏳ Opponent's turn (${currentTurn.toUpperCase()})`;
            }
        });

        socket.on('invalidMove', () => {
            statusDiv.innerHTML = `❌ Invalid move!`;
            setTimeout(() => {
                if (gameActive) statusDiv.innerHTML = `Your turn again`;
            }, 1000);
        });

        socket.on('invalidTurn', () => {
            statusDiv.innerHTML = `⏳ Not your turn!`;
        });

        socket.on('opponentLeft', () => {
            alert('Opponent disconnected. Game ended.');
            gameActive = false;
            statusDiv.innerHTML = `Opponent left. Create a new room.`;
        });

        // ----- 3D rendering -----
        function createPiece(color, row, col, isKing) {
            const group = new THREE.Group();
            const pieceColor = color === 'red' ? redColor : blackColor;
            const body = new THREE.Mesh(new THREE.CylinderGeometry(0.32, 0.35, 0.2, 32), new THREE.MeshStandardMaterial({ color: pieceColor, metalness: 0.6 }));
            body.position.y = 0.1;
            group.add(body);
            const ring = new THREE.Mesh(new THREE.TorusGeometry(0.28, 0.04, 32, 64), new THREE.MeshStandardMaterial({ color: color === 'red' ? 0xff6666 : 0x5588ff, metalness: 0.8 }));
            ring.rotation.x = Math.PI / 2;
            ring.position.y = 0.22;
            group.add(ring);
            if (isKing) {
                const crown = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.25, 0.12, 8), new THREE.MeshStandardMaterial({ color: 0xffd700, metalness: 0.9 }));
                crown.position.y = 0.32;
                group.add(crown);
            }
            const x = (col - 3.5) * 0.85;
            const z = (row - 3.5) * 0.85;
            group.position.set(x, 0, z);
            return group;
        }

        function renderPiecesFromBoard() {
            while(piecesGroup.children.length) piecesGroup.remove(piecesGroup.children[0]);
            for(let r=0; r<8; r++) {
                for(let c=0; c<8; c++) {
                    const p = boardState[r][c];
                    if(p) {
                        const mesh = createPiece(p.color, r, c, p.king);
                        mesh.userData = { row: r, col: c };
                        piecesGroup.add(mesh);
                    }
                }
            }
        }

        function createBoard3D() {
            const group = new THREE.Group();
            for(let r=0; r<8; r++) {
                for(let c=0; c<8; c++) {
                    const col = (r+c)%2===0 ? lightColor : darkColor;
                    const square = new THREE.Mesh(new THREE.BoxGeometry(0.85, 0.08, 0.85), new THREE.MeshStandardMaterial({ color: col, roughness: 0.4 }));
                    const x = (c - 3.5) * 0.85;
                    const z = (r - 3.5) * 0.85;
                    square.position.set(x, -0.04, z);
                    square.userData = { row: r, col: c };
                    group.add(square);
                }
            }
            return group;
        }

        function clearHighlights() {
            highlights.forEach(h => scene.remove(h));
            highlights = [];
        }

        function showValidMoves(row, col) {
            clearHighlights();
            const moves = getValidMovesLocal(row, col);
            moves.forEach(m => {
                const sphere = new THREE.Mesh(new THREE.SphereGeometry(0.18, 24, 24), new THREE.MeshStandardMaterial({ color: 0x00ff88, emissive: 0x00aa44, transparent: true, opacity: 0.8 }));
                const x = (m.col - 3.5) * 0.85;
                const z = (m.row - 3.5) * 0.85;
                sphere.position.set(x, 0.08, z);
                scene.add(sphere);
                highlights.push(sphere);
            });
        }

        function getValidMovesLocal(row, col) {
            const piece = boardState[row][col];
            if (!piece || piece.color !== myColor) return [];
            const moves = [];
            const dirs = piece.king ? [-1,1] : [piece.color === 'red' ? -1 : 1];
            // jumps
            for (const rd of dirs) {
                for (const cd of [-1,1]) {
                    const tr = row + rd*2, tc = col + cd*2;
                    if (tr>=0 && tr<8 && tc>=0 && tc<8) {
                        const midRow = row+rd, midCol = col+cd;
                        const jumped = boardState[midRow][midCol];
                        const target = boardState[tr][tc];
                        if (jumped && jumped.color !== piece.color && !target) {
                            moves.push({ row: tr, col: tc, isJump: true });
                        }
                    }
                }
            }
            if (moves.length === 0) {
                for (const rd of dirs) {
                    for (const cd of [-1,1]) {
                        const tr = row+rd, tc = col+cd;
                        if (tr>=0 && tr<8 && tc>=0 && tc<8 && !boardState[tr][tc]) {
                            moves.push({ row: tr, col: tc, isJump: false });
                        }
                    }
                }
            }
            return moves;
        }

        function isValidMoveLocal(fr,fc,tr,tc) {
            const moves = getValidMovesLocal(fr,fc);
            return moves.some(m => m.row === tr && m.col === tc);
        }

        function sendMove(fr,fc,tr,tc) {
            socket.emit('makeMove', {
                roomId: currentRoom,
                fromRow: fr,
                fromCol: fc,
                toRow: tr,
                toCol: tc
            });
            statusDiv.innerHTML = `📡 Move sent...`;
        }

        function handleClick(row, col) {
            if (!gameActive || myColor !== currentTurn) return;
            if (selectedPiece === null) {
                const piece = boardState[row][col];
                if (piece && piece.color === myColor) {
                    const moves = getValidMovesLocal(row, col);
                    if (moves.length > 0) {
                        selectedPiece = piece;
                        selectedRow = row;
                        selectedCol = col;
                        showValidMoves(row, col);
                    }
                } else {
                    clearHighlights();
                    selectedPiece = null;
                }
            } else {
                if (isValidMoveLocal(selectedRow, selectedCol, row, col)) {
                    sendMove(selectedRow, selectedCol, row, col);
                    clearHighlights();
                    selectedPiece = null;
                } else {
                    clearHighlights();
                    selectedPiece = null;
                }
            }
        }

        // ----- Three.js setup -----
        function initThree() {
            const canvas = document.createElement('canvas');
            canvas.id = 'gameCanvas';
            canvas.style.width = '100%';
            canvas.style.height = '100%';
            canvas.style.display = 'block';
            document.body.appendChild(canvas);
            
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0a0a2a);
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(5, 6, 5.5);
            renderer = new THREE.WebGLRenderer({ antialias: true, canvas });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.target.set(0, 0.3, 0);
            
            const ambient = new THREE.AmbientLight(0x404060);
            scene.add(ambient);
            const main = new THREE.DirectionalLight(0xffffff, 1);
            main.position.set(5, 10, 7);
            main.castShadow = true;
            scene.add(main);
            const fill = new THREE.PointLight(0x4466cc, 0.3);
            fill.position.set(-2, 3, 4);
            scene.add(fill);
            
            const boardObj = createBoard3D();
            scene.add(boardObj);
            piecesGroup = new THREE.Group();
            scene.add(piecesGroup);
            
            raycaster = new THREE.Raycaster();
            mouse = new THREE.Vector2();
            
            renderer.domElement.addEventListener('click', (e) => {
                const rect = renderer.domElement.getBoundingClientRect();
                mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
                mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
                raycaster.setFromCamera(mouse, camera);
                const hits = raycaster.intersectObjects(scene.children, true);
                for (let hit of hits) {
                    let obj = hit.object;
                    while (obj) {
                        if (obj.userData && obj.userData.row !== undefined) {
                            handleClick(obj.userData.row, obj.userData.col);
                            return;
                        }
                        obj = obj.parent;
                    }
                }
            });
            
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
            
            function animate() {
                requestAnimationFrame(animate);
                controls.update();
                renderer.render(scene, camera);
            }
            animate();
        }

        createBtn.onclick = () => {
            socket.emit('createRoom');
        };
        joinBtn.onclick = () => {
            const code = roomCodeInput.value.trim().toUpperCase();
            if (code) socket.emit('joinRoom', code);
            else alert('Enter room code');
        };

        initThree();
    </script>
</body>
</html>
